name: Lint

on:
    pull_request:
        branches: ["main"]
    push:
        branches: ["main"]
    workflow_dispatch: {}

jobs:
    lint:
        runs-on: blacksmith-2vcpu-ubuntu-2404

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}

            - name: Lint code
              run: bun lint

            - name: Format code
              run: bunx prettier --check .
