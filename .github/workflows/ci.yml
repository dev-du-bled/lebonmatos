name: CI

on:
  push:
    branches:
      # to test only cause dispatch doesnt work for whatever reason
      - tests/e2e
  pull_request:
  workflow_dispatch:

env:
  DATABASE_URL: postgresql://lbmuser:lbmsupersecurepassword@localhost:5432/lbmtestdb
  BETTER_AUTH_SECRET: placeholdersecret
  NEXT_PUBLIC_GOOGLE_RECAPTCHA_SITE_KEY: placeholdersecret
  GOOGLE_RECAPTCHA_SECRET_KEY: placeholdersecret
  UPLOADTHING_TOKEN: placeholdersecret
  MEILI_HOST: http://localhost:7700
  MEILI_MASTER_KEY: placeholdersecret
  RESEND_API_KEY: placeholdersecret

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
      - name: Lint code
        run: bun lint

      - name: Format code
        run: bunx prettier --check .

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install

      - name: Build app
        run: bun run build:local

  test:
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:alpine
        env:
          POSTGRES_USER: lbmuser
          POSTGRES_PASSWORD: lbmsupersecurepassword
          POSTGRES_DB: lbmtestdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      meilisearch:
        image: getmeili/meilisearch:v1.26.0
        env:
          MEILI_MASTER_KEY: placeholdersecret
        ports:
          - 7700:7700

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install

      - name: Install Playwright chromium
        run: bunx playwright install --with-deps chromium

      - name: Run tests
        run: bun run tests:run
