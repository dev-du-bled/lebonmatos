name: CI
on:
  push:
    branches:
      - tests/e2e
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://lbmuser:lbmsupersecurepassword@localhost:5432/lbmtestdb
  BETTER_AUTH_SECRET: placeholdersecret
  NEXT_PUBLIC_GOOGLE_RECAPTCHA_SITE_KEY: placeholdersecret
  GOOGLE_RECAPTCHA_SECRET_KEY: placeholdersecret
  UPLOADTHING_TOKEN: placeholdersecret
  MEILI_HOST: http://localhost:7700
  MEILI_MASTER_KEY: placeholdersecret
  NEXT_PUBLIC_TESTS_ENV: true
  RESEND_API_KEY: placeholdersecret

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Lint"
            command: "lint"
          - name: "Format Check"
            command: "prettier --check ."
            use_bunx: true
          - name: "Type Check"
            command: "typecheck"

    name: ${{ matrix.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.use_bunx && 'bunx' || 'bun run' }} ${{ matrix.command }}

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-
            ${{ runner.os }}-nextjs-

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build app
        run: bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: next-build
          path: .next
          include-hidden-files: true
          compression-level: 9

  tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: [build, lint]
    services:
      postgres:
        image: postgres:alpine
        env:
          POSTGRES_USER: lbmuser
          POSTGRES_PASSWORD: lbmsupersecurepassword
          POSTGRES_DB: lbmtestdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      meilisearch:
        image: getmeili/meilisearch:v1.26.0
        env:
          MEILI_MASTER_KEY: placeholdersecret
        ports:
          - 7700:7700

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Cache Playwright binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Install Playwright chromium
        run: bunx playwright install --with-deps chromium

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: next-build
          path: .next

      - name: Run tests
        run: bun run tests:run