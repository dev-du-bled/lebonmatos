name: Lint

on:
    pull_request:
        branches: ["main"]
    workflow_dispatch: {}

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Lint code
              run: bun lint

            - name: Format code
              run: bunx prettier --write .
